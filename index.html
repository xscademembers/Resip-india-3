<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReSip India — Handcrafted, sustainable, upcycled glassware. Premium designer glasses made from discarded bottles. Shop tumblers, shots, jars &amp; more." />
    <title>Resip India | Premium Upcycled Glassware</title>

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://static.wixstatic.com" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <!-- DNS-prefetch fallback for older browsers -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://static.wixstatic.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Preload hero image for fast LCP (WebP auto-format) -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=70&w=1280&fm=webp"
      fetchpriority="high"
    />
    <!-- Preload brand logo -->
    <link
      rel="preload"
      as="image"
      href="https://static.wixstatic.com/media/7dc839_2e48de9b008d43d58067c17afc5dc6fb~mv2.jpg/v1/fill/w_280,h_80,al_c,q_80,usm_0.66_1.00_0.01/image.webp"
    />

    <!-- Non-blocking font loading: preload then async switch -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Outfit:wght@400;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
